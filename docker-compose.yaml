version: '3.8'

services:
  s3mock:
    image: adobe/s3mock:latest
    ports:
      - "9090:9090"
    environment:
      - initialBuckets=mybucket,testbucket
    volumes:
      - ./s3mock-data:/data

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${WS3_ACCESS_KEY:-test}
      - MINIO_ROOT_PASSWORD=${WS3_SECRET_KEY:-testtest}
    command: server /data --console-address ":9001"
    volumes:
      - ./minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${WS3_ACCESS_KEY:-test}
      - MINIO_ROOT_PASSWORD=${WS3_SECRET_KEY:-testtest}
      - BUCKET_NAME=${WS3_BUCKET_NAME:-backupdata}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${BUCKET_NAME};
      mc anonymous set download local/$${BUCKET_NAME} || true;
      echo 'MinIO bucket ready: '$${BUCKET_NAME};
      "
